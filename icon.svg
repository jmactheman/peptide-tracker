<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <!-- Red background -->
  <rect width="180" height="180" rx="38" fill="#dc2626"/>

  <!-- Syringe: drawn horizontal, rotated -35° around barrel centre (80,60) -->
  <g transform="rotate(-35,80,60)">
    <!-- Plunger T-press -->
    <rect x="12" y="52" width="24" height="7" rx="2" fill="white"/>
    <!-- Plunger rod -->
    <rect x="36" y="57" width="18" height="2.5" rx="1" fill="white"/>
    <!-- Barrel -->
    <rect x="54" y="50" width="62" height="20" rx="4" fill="white"/>
    <!-- Scale marks inside barrel -->
    <rect x="70" y="54" width="2" height="12" fill="#dc2626" opacity="0.45"/>
    <rect x="84" y="54" width="2" height="12" fill="#dc2626" opacity="0.45"/>
    <rect x="98" y="54" width="2" height="12" fill="#dc2626" opacity="0.45"/>
    <!-- Finger flange wings at barrel end -->
    <rect x="112" y="44" width="6" height="32" rx="2" fill="white"/>
    <!-- Needle hub -->
    <rect x="118" y="57" width="5" height="6" rx="1" fill="white"/>
    <!-- Needle (long, fine) -->
    <line x1="123" y1="60" x2="164" y2="60" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
  </g>

  <!-- Vial (upright, upper-right) -->
  <!-- Cap (grey rubber stopper area) -->
  <rect x="133" y="38" width="16" height="8" rx="2" fill="#cccccc"/>
  <rect x="135" y="38" width="12" height="4" rx="1.5" fill="white"/>
  <!-- Body -->
  <rect x="130" y="45" width="22" height="34" rx="3" fill="white"/>
  <!-- Label inset -->
  <rect x="133" y="54" width="16" height="18" rx="1.5" fill="#dc2626" opacity="0.15"/>

  <!-- Swoosh arc beneath syringe + vial -->
  <path d="M 18 94 Q 90 72 154 88" stroke="white" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- "Pep Bros" wordmark -->
  <text x="90" y="127"
        font-family="'Arial Black', 'Impact', Arial, sans-serif"
        font-size="28"
        font-weight="900"
        font-style="italic"
        fill="white"
        text-anchor="middle"
        letter-spacing="-0.5">Pep Bros</text>

  <!-- Double rule lines -->
  <line x1="38" y1="135" x2="142" y2="135" stroke="white" stroke-width="1.5"/>
  <line x1="38" y1="140" x2="142" y2="140" stroke="white" stroke-width="1.5"/>
</svg>
